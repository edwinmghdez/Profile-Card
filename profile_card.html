<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./css/profile_card.css">
</head>
<body>
    <div class="profile">
        <div class="top">
        </div>
        <div class="img" align="center">
            <div id="circulo">
                <img src="./img/image-victor.jpg" alt="">
            </div>
        </div>
        <div class="datos">
            <p id="name"><b>Victor Crest</b> 26</p>
            <p id="city">London</p>
            <div id="separacion"></div>
        </div>
        <div class="socials">
            <div class="item_1">
                <p id="p1"><b>80K</b></p>
                <p id="Followers">Followers</p>
            </div>
            <div class="item_2">
                <p id="p2"><b>803K</b></p>
                <p id="Likes">Likes</p>
            </div>
            <div class="item_3">
                <p id="p3"><b>1.4K</b></p>
                <p id="Photos">Photos</p>
            </div>
        </div>
    </div>
</body>
</html>
